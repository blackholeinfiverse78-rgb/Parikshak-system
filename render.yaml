services:
  # 1. Backend Service
  - type: web
    name: task-review-backend
    env: python
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: GITHUB_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # Note: Set ALLOWED_ORIGINS to the frontend URL once assigned

  # 2. Frontend Static Site Service
  - type: web
    name: task-review-frontend
    runtime: static
    plan: free
    # Removed region (static sites cannot have a region)
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: task-review-backend
          property: host
