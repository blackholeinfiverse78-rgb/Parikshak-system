services:
  # Backend API (FastAPI)
  - type: web
    name: task-review-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: ALLOWED_ORIGINS
        value: '["https://task-review-agent-frontend.vercel.app"]'
      - key: GITHUB_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
